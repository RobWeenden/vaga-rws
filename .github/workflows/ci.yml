name: Build e Testes

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  # Job 1: Backend
  backend-build:
    name: Backend - Build e Testes
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build com Maven
        working-directory: ./vagas-rws-backend
        run: mvn clean install -DskipTests
      
      - name: Executar Testes
        working-directory: ./vagas-rws-backend
        run: mvn test
      
      - name: Upload do JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: vagas-rws-backend/target/*.jar
          retention-days: 7

  # Job 2: Frontend
  frontend-build:
    name: Frontend - Build e Testes
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vaga-rws-frontend/package-lock.json
      
      - name: Instalar dependências
        working-directory: ./vaga-rws-frontend
        run: npm ci
      
      - name: Build Angular
        working-directory: ./vaga-rws-frontend
        run: npm run build
      
      - name: Upload do Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: vaga-rws-frontend/dist
          retention-days: 7
