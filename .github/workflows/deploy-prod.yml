name: Pipeline Produção

# Deploy para ambiente de produção
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      action:
        description: 'Escolha a ação'
        required: true
        type: choice
        options:
          - build
          - build+deploy
        default: 'build+deploy'
      version:
        description: 'Versão (ex: v1.0.0) - Deixe em branco para extrair do PR'
        required: false
        type: string

jobs:
  # Job 0: Extrair versão do PR (quando houver merge para main)
  extract-version:
    name: 📋 Extrair Versão
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Obter Versão
        id: get-version
        run: |
          VERSION=""
          
          # Se for tag push, usa a tag
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            echo "📌 Versão da tag: $VERSION"
          
          # Se workflow manual com versão informada, usa ela
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "✍️ Versão manual informada: $VERSION"
          
          # Senão, busca do último PR mergeado
          else
            echo "🔍 Buscando versão do último Pull Request mergeado..."
            
            # Busca o último commit na main
            COMMIT_SHA="${{ github.sha }}"
            
            # Busca PRs mergeados neste commit
            PR_NUMBER=$(gh pr list --state merged --search "$COMMIT_SHA" --json number --jq '.[0].number' 2>/dev/null || echo "")
            
            if [ -n "$PR_NUMBER" ]; then
              echo "📋 PR encontrado: #$PR_NUMBER"
              
              # Busca o corpo do PR
              PR_BODY=$(gh pr view $PR_NUMBER --json body --jq '.body' 2>/dev/null || echo "")
              
              # Extrai versão do campo "**Versão**:" ou "Versão:"
              VERSION=$(echo "$PR_BODY" | grep -oP '(?<=\*\*Versão\*\*:\s*)(v?\d+\.\d+\.\d+)' || echo "")
              
              if [ -z "$VERSION" ]; then
                VERSION=$(echo "$PR_BODY" | grep -oP '(?<=Versão:\s*)(v?\d+\.\d+\.\d+)' || echo "")
              fi
              
              if [ -n "$VERSION" ]; then
                # Garante que começa com 'v'
                if [[ ! "$VERSION" =~ ^v ]]; then
                  VERSION="v$VERSION"
                fi
                echo "✅ Versão extraída do PR #$PR_NUMBER: $VERSION"
              fi
            fi
            
            # Se ainda não encontrou, tenta buscar do título do PR
            if [ -z "$VERSION" ] && [ -n "$PR_NUMBER" ]; then
              PR_TITLE=$(gh pr view $PR_NUMBER --json title --jq '.title' 2>/dev/null || echo "")
              VERSION=$(echo "$PR_TITLE" | grep -oP 'v?\d+\.\d+\.\d+' || echo "")
              if [ -n "$VERSION" ]; then
                if [[ ! "$VERSION" =~ ^v ]]; then
                  VERSION="v$VERSION"
                fi
                echo "✅ Versão extraída do título do PR: $VERSION"
              fi
            fi
            
            # Se ainda não encontrou, usa data como fallback
            if [ -z "$VERSION" ]; then
              VERSION="v0.0.0-$(date +%Y%m%d-%H%M%S)"
              echo "⚠️ Versão não encontrada no PR, usando fallback: $VERSION"
            fi
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🏷️ Versão final: $VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 1: Testes Backend
  backend-tests:
    name: Backend - Testes
    runs-on: ubuntu-latest
    needs: [extract-version]
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Simular Testes Unitários Backend
        run: |
          echo "🧪 SIMULAÇÃO: Executando testes unitários do backend..."
          echo "   → Teste: UserServiceTest.shouldCreateUser() ✅"
          echo "   → Teste: UserServiceTest.shouldUpdateUser() ✅"
          echo "   → Teste: VagaControllerTest.shouldListVagas() ✅"
          echo "   → Teste: VagaServiceTest.shouldCreateVaga() ✅"
          sleep 2
          echo "📊 Resultados: 25 testes executados, 25 passaram, 0 falharam"
          echo "✅ Testes unitários backend concluídos!"
      
      - name: Simular Relatório de Cobertura
        run: |
          echo "📊 SIMULAÇÃO: Gerando relatório de cobertura (JaCoCo)..."
          echo "   Coverage: 85% das linhas"
          echo "   Coverage: 78% dos branches"
          echo "✅ Relatório de cobertura gerado!"

  # Job 2: Testes Frontend
  frontend-tests:
    name: Frontend - Testes
    runs-on: ubuntu-latest
    needs: [extract-version]
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Simular Testes Unitários Frontend
        run: |
          echo "🧪 SIMULAÇÃO: Executando testes unitários do frontend..."
          echo "   → Teste: AppComponent should create ✅"
          echo "   → Teste: VagaListComponent should display vagas ✅"
          echo "   → Teste: VagaFormComponent should validate form ✅"
          echo "   → Teste: AuthService should login successfully ✅"
          sleep 2
          echo "📊 Resultados: 18 testes executados, 18 passaram, 0 falharam"
          echo "📊 Coverage: 82% Statements, 75% Branches, 80% Functions"
          echo "✅ Testes frontend concluídos!"

  # Job 3: SonarQube - Análise de Qualidade
  sonarqube-analysis:
    name: SonarQube - Análise de Código
    runs-on: ubuntu-latest
    needs: [extract-version, backend-tests, frontend-tests]
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Simular Análise SonarQube - Backend
        run: |
          echo "🔍 SIMULAÇÃO: Analisando qualidade do código backend..."
          sleep 2
          echo "📊 Resultados da Análise:"
          echo "   ✅ Quality Gate: PASSOU"
          echo "   → 0 Bugs"
          echo "   → 2 Code Smells (minor)"
          echo "   → 0 Vulnerabilidades"
          echo "   → 0 Security Hotspots"
          echo "   → Coverage: 85.3%"
          echo "   → Maintainability Rating: A"
          echo "   → Reliability Rating: A"
          echo "   → Security Rating: A"
          echo "✅ Análise SonarQube backend concluída!"
      
      - name: Simular Análise SonarQube - Frontend
        run: |
          echo "🔍 SIMULAÇÃO: Analisando qualidade do código frontend..."
          sleep 2
          echo "📊 Resultados da Análise:"
          echo "   ✅ Quality Gate: PASSOU"
          echo "   → 0 Bugs"
          echo "   → 5 Code Smells (minor)"
          echo "   → 0 Vulnerabilidades"
          echo "   → Coverage: 82.1%"
          echo "   → Maintainability Rating: A"
          echo "✅ Análise SonarQube frontend concluída!"

  # Job 4: Build
  build:
    name: Build - Backend e Frontend
    runs-on: ubuntu-latest
    needs: [extract-version, backend-tests, frontend-tests, sonarqube-analysis]
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Configurar Versão
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          echo "🏷️  Versão: $VERSION"
          
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "⚠️  Aviso: Formato de versão não segue padrão semântico (v1.2.3)"
          fi
          
          echo "✅ Versão configurada!"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      
      - name: Simular Build Backend para Produção
        run: |
          echo "🔨 SIMULAÇÃO: Building backend para PRODUÇÃO..."
          sleep 2
          echo "   [INFO] Compilando classes Java..."
          echo "   [INFO] Processando dependências..."
          echo "   [INFO] Executando build com Maven (prod profile)..."
          echo "   [INFO] BUILD SUCCESS"
          echo "   [INFO] JAR gerado: vaga-rws-${{ env.VERSION }}.jar (45.2 MB)"
          echo "✅ Backend build para produção concluído!"
      
      - name: Simular Build Frontend para Produção
        run: |
          echo "🔨 SIMULAÇÃO: Building frontend para PRODUÇÃO..."
          sleep 2
          echo "   ✔ Installing dependencies..."  
          echo "   ✔ Building Angular application (production mode)..."
          echo "   ✔ Optimization: minification, tree-shaking"
          echo "   ✔ Build at: dist/vaga-rws-frontend (1.8 MB)"
          echo "✅ Frontend build para produção concluído!"
      
      - name: Simular Build Docker Images com Tag de Versão
        run: |
          echo "🐳 SIMULAÇÃO: Building Docker images para produção..."
          sleep 2
          echo "   ✅ Successfully built backend image"
          echo "   ✅ Successfully built frontend image"
          echo ""
          echo "🏷️  Taggeando images:"
          echo "   → vaga-rws:${{ env.VERSION }}"
          echo "   → vaga-rws:latest"
          echo "   → vaga-rws-frontend:${{ env.VERSION }}"
          echo "   → vaga-rws-frontend:latest"
          echo "✅ Docker images criadas e taggeadas!"
      
      - name: Simular Upload de Artefatos
        run: |
          echo "📦 SIMULAÇÃO: Upload de artefatos de produção..."
          echo "   ✅ backend-prod-${{ env.VERSION }}.jar (45.2 MB)"
          echo "   ✅ frontend-prod-${{ env.VERSION }}.zip (1.8 MB)"
          echo "   Retention: 90 dias"
          echo "✅ Artefatos disponíveis para download!"
      
      - name: Gerar Resumo do Build
        run: |
          echo "## ✅ Build de Produção Concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Pipeline Executado" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Testes Backend (25 testes)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Testes Frontend (18 testes)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Análise SonarQube (Quality Gate: PASSOU)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build Backend (JAR: 45.2 MB)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build Frontend (Dist: 1.8 MB)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker Images (${{ env.VERSION }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏷️ Versão" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artefatos Gerados" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`backend-prod-${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`frontend-prod-${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY

  # Job 5: Deploy (Condicional - só executa com input 'build+deploy' ou tag push)
  deploy:
    name: Deploy em Produção
    runs-on: ubuntu-latest
    needs: [extract-version, build]
    if: github.event.inputs.action == 'build+deploy' || github.event_name == 'push'
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/releases/tag/${{ needs.extract-version.outputs.version }}
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Configurar Versão
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "🏷️ Versão para deploy: $VERSION"
      
      - name: Criar Backup Virtual
        run: |
          echo "💾 SIMULAÇÃO: Criando backup do banco de dados..."
          sleep 2
          echo "Ambiente: PRODUÇÃO"
          echo "Data: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "Versão atual: v0.9.0"
          echo "Nova versão: ${{ env.VERSION }}"
          echo "✅ Backup criado: backup-$(date +%Y%m%d-%H%M%S).sql"
      
      - name: Deploy em Produção
        run: |
          echo "🚀 Iniciando deploy em PRODUÇÃO..."
          echo ""
          echo "📦 Versão: ${{ env.VERSION }}"
          echo "🔗 Tag: ${{ env.VERSION }}"
          echo "👤 Autor: ${{ github.actor }}"
          echo "📅 Data: $(date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          echo "⚡ Executando deploy steps..."
          sleep 2
          echo "  ✅ Containers parados"
          sleep 1
          echo "  ✅ Backup do banco criado"
          sleep 1
          echo "  ✅ Imagens atualizadas (${{ env.VERSION }})"
          sleep 1
          echo "  ✅ Migrações de banco executadas"
          sleep 1
          echo "  ✅ Containers iniciados"
          sleep 2
          echo "  ✅ Health check: OK"
          echo "  ✅ Smoke tests: PASSOU"
          echo ""
          echo "🎉 Deploy em PRODUÇÃO concluído com sucesso!"
          echo "🌐 Backend: https://vagarws.com/api"
          echo "🌐 Frontend: https://vagarws.com"
      
      - name: Criar Tag Git (se não for push de tag)
        if: ${{ github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "🏷️ Criando tag Git: ${{ env.VERSION }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Verifica se a tag já existe
          if git rev-parse "${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "⚠️ Tag ${{ env.VERSION }} já existe, pulando criação"
          else
            git tag -a ${{ env.VERSION }} -m "Release ${{ env.VERSION }} via GitHub Actions"
            git push origin ${{ env.VERSION }}
            echo "✅ Tag criada e enviada para o repositório!"
          fi
      
      - name: Criar Release no GitHub com Notes Automáticos
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          generate_release_notes: true  # GitHub gera automaticamente dos PRs!
          draft: false
          prerelease: false
          body: |
            ## 🚀 Deploy em Produção - ${{ env.VERSION }}
            
            **Data**: $(date '+%Y-%m-%d %H:%M:%S')
            **Responsável**: ${{ github.actor }}
            
            ### ✅ Pipeline Executado
            - ✅ Testes Backend + Frontend
            - ✅ Análise de Qualidade (SonarQube)
            - ✅ Build de Produção
            - ✅ Backup do Banco de Dados
            - ✅ Deploy em Produção
            
            ### 🔗 Ambientes
            - **Produção**: https://vagarws.com
            - **API**: https://vagarws.com/api
            
            ---
            
            ### 📋 Changelog Automático
            
            _(Release notes gerados automaticamente dos Pull Requests mergeados)_
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Gerar Resumo do Deploy
        run: |
          echo "## 🎉 Deploy em PRODUÇÃO Concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Pipeline Completo Executado" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Testes Backend + Frontend" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Análise SonarQube" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build para Produção" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Backup do Banco" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Deploy em Produção**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Release ${{ env.VERSION }} Criada com Release Notes Automáticos**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏷️ Versão Implantada" >> $GITHUB_STEP_SUMMARY
          echo "- **${{ env.VERSION }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Release Notes" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 [Ver Release Completa](https://github.com/${{ github.repository }}/releases/tag/${{ env.VERSION }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Ambientes Disponíveis" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: https://vagarws.com/api" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: https://vagarws.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Tecnologias" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: Spring Boot 3.3.6 + Java 21" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: Angular 19" >> $GITHUB_STEP_SUMMARY
          echo "- Database: PostgreSQL" >> $GITHUB_STEP_SUMMARY
