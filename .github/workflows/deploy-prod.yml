name: Deploy - Produção

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão para deploy (ex: v1.0.0)'
        required: true
        type: string

jobs:
  deploy:
    name: Deploy em Produção
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Validar versão
        run: |
          VERSION="${{ github.ref_name }}"
          echo "🏷️  Versão: $VERSION"
          
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Formato de versão inválido! Use: v1.0.0"
            exit 1
          fi
          
          echo "✅ Versão válida!"
      
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build Backend para Produção
        working-directory: ./vagas-rws-backend
        run: |
          echo "🔨 Building backend para PRODUÇÃO..."
          mvn clean package -DskipTests
          echo "✅ Backend build concluído!"
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vaga-rws-frontend/package-lock.json
      
      - name: Build Frontend para Produção
        working-directory: ./vaga-rws-frontend
        run: |
          echo "🔨 Building frontend para PRODUÇÃO..."
          npm ci
          npm run build -- --configuration production
          echo "✅ Frontend build concluído!"
      
      - name: Build Docker Images com Tag de Versão
        run: |
          echo "🐳 Building Docker images..."
          VERSION="${{ github.ref_name }}"
          docker-compose build
          docker tag vaga-rws:1.0 vaga-rws:${VERSION}
          echo "✅ Docker images criadas com tag ${VERSION}!"
      
      - name: Criar Backup Virtual
        run: |
          echo "💾 Simulando backup do banco de dados..."
          echo "Ambiente: PRODUÇÃO"
          echo "Data: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "Versão anterior: v0.0.1"
          echo "Nova versão: ${{ github.ref_name }}"
          echo "✅ Backup simulado criado!"
      
      - name: Deploy em Produção
        run: |
          echo "🚀 Iniciando deploy em PRODUÇÃO..."
          echo ""
          echo "📦 Versão: ${{ github.ref_name }}"
          echo "🔗 Branch: ${{ github.ref_name }}"
          echo "👤 Autor: ${{ github.actor }}"
          echo "📅 Data: $(date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          echo "⚡ Executando deploy steps..."
          sleep 2
          echo "  ✅ Containers parados"
          sleep 1
          echo "  ✅ Imagens atualizadas"
          sleep 1
          echo "  ✅ Banco de dados migrado"
          sleep 1
          echo "  ✅ Containers iniciados"
          sleep 2
          echo "  ✅ Health check: OK"
          echo ""
          echo "🎉 Deploy em PRODUÇÃO concluído com sucesso!"
          echo "🌐 Backend: https://vagarws.com:8080"
          echo "🌐 Frontend: https://vagarws.com"
      
      - name: Upload Backend Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-prod-${{ github.ref_name }}
          path: vagas-rws-backend/target/*.jar
          retention-days: 90
      
      - name: Upload Frontend Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-prod-${{ github.ref_name }}
          path: vaga-rws-frontend/dist
          retention-days: 90
      
      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          files: |
            vagas-rws-backend/target/*.jar
          body: |
            ## 🚀 Release ${{ github.ref_name }} - Vaga RWS
            
            Deploy realizado com sucesso em produção!
            
            ### 📦 Artefatos
            - Backend JAR incluído nesta release
            - Frontend build disponível nos artifacts
            - Docker images: vaga-rws:${{ github.ref_name }}
            
            ### 👥 Deploy aprovado por
            Reviewers configurados no ambiente de produção
            
            ### 📊 Métricas
            - Commit: ${{ github.sha }}
            - Autor: ${{ github.actor }}
            - Data: $(date '+%Y-%m-%d %H:%M:%S')
            
            ### 🔧 Tecnologias
            - Backend: Spring Boot 3.3.6 + Java 21
            - Frontend: Angular 19
            - Database: PostgreSQL
