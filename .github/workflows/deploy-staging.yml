name: Pipeline Staging

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Escolha a ação'
        required: true
        type: choice
        options:
          - build
          - build+deploy
        default: 'build+deploy'

jobs:
  # Job 1: Testes Backend  
  backend-tests:
    name: Backend - Testes
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Simular Testes Unitários Backend
        run: |
          echo "🧪 SIMULAÇÃO: Executando testes unitários do backend..."
          echo "   → Teste: UserServiceTest.shouldCreateUser() ✅"
          echo "   → Teste: UserServiceTest.shouldUpdateUser() ✅"
          echo "   → Teste: VagaControllerTest.shouldListVagas() ✅"
          echo "   → Teste: VagaServiceTest.shouldCreateVaga() ✅"
          sleep 2
          echo "📊 Resultados: 25 testes executados, 25 passaram, 0 falharam"
          echo "✅ Testes unitários backend concluídos!"
      
      - name: Simular Relatório de Cobertura
        run: |
          echo "📊 SIMULAÇÃO: Gerando relatório de cobertura (JaCoCo)..."
          echo "   Coverage: 85% das linhas"
          echo "   Coverage: 78% dos branches"
          echo "✅ Relatório de cobertura gerado!"

  # Job 2: Testes Frontend
  frontend-tests:
    name: Frontend - Testes
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Simular Testes Unitários Frontend
        run: |
          echo "🧪 SIMULAÇÃO: Executando testes unitários do frontend..."
          echo "   → Teste: AppComponent should create ✅"
          echo "   → Teste: VagaListComponent should display vagas ✅"
          echo "   → Teste: VagaFormComponent should validate form ✅"
          echo "   → Teste: AuthService should login successfully ✅"
          sleep 2
          echo "📊 Resultados: 18 testes executados, 18 passaram, 0 falharam"
          echo "📊 Coverage: 82% Statements, 75% Branches, 80% Functions"
          echo "✅ Testes frontend concluídos!"

  # Job 3: SonarQube - Análise de Qualidade
  sonarqube-analysis:
    name: SonarQube - Análise de Código
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Simular Análise SonarQube - Backend
        run: |
          echo "🔍 SIMULAÇÃO: Analisando qualidade do código backend..."
          sleep 2
          echo "📊 Resultados da Análise:"
          echo "   ✅ Quality Gate: PASSOU"
          echo "   → 0 Bugs"
          echo "   → 2 Code Smells (minor)"
          echo "   → 0 Vulnerabilidades"
          echo "   → 0 Security Hotspots"
          echo "   → Coverage: 85.3%"
          echo "   → Duplicação: 1.2%"
          echo "   → Maintainability Rating: A"
          echo "   → Reliability Rating: A"
          echo "   → Security Rating: A"
          echo "✅ Análise SonarQube backend concluída!"
      
      - name: Simular Análise SonarQube - Frontend
        run: |
          echo "🔍 SIMULAÇÃO: Analisando qualidade do código frontend..."
          sleep 2
          echo "📊 Resultados da Análise:"
          echo "   ✅ Quality Gate: PASSOU"
          echo "   → 0 Bugs"
          echo "   → 5 Code Smells (minor)"
          echo "   → 0 Vulnerabilidades"
          echo "   → Coverage: 82.1%"
          echo "   → Duplicação: 0.8%"
          echo "   → Maintainability Rating: A"
          echo "✅ Análise SonarQube frontend concluída!"

  # Job 4: Build
  build:
    name: Build - Backend e Frontend
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, sonarqube-analysis]
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Simular Build Backend
        run: |
          echo "🔨 SIMULAÇÃO: Building backend para staging..."
          sleep 2
          echo "   [INFO] Compilando classes Java..."
          echo "   [INFO] Processando dependências..."
          echo "   [INFO] Executando build com Maven..."
          echo "   [INFO] BUILD SUCCESS"
          echo "   [INFO] JAR gerado: vaga-rws-0.0.1-SNAPSHOT.jar (45.2 MB)"
          echo "✅ Backend build concluído!"
      
      - name: Simular Build Frontend
        run: |
          echo "🔨 SIMULAÇÃO: Building frontend para staging..."
          sleep 2
          echo "   ✔ Installing dependencies..."
          echo "   ✔ Building Angular application..."
          echo "   ✔ Optimization complete"
          echo "   ✔ Build at: dist/vaga-rws-frontend (2.5 MB)"
          echo "✅ Frontend build concluído!"
      
      - name: Simular Build Docker Images
        run: |
          echo "🐳 SIMULAÇÃO: Building Docker images..."
          sleep 2
          echo "   Step 1/8 : FROM openjdk:21-jdk-slim"
          echo "   Step 2/8 : WORKDIR /app"
          echo "   Step 3/8 : COPY target/*.jar app.jar"
          echo "   Step 8/8 : CMD java -jar app.jar"
          echo "   ✅ Successfully built backend image"
          echo ""
          echo "   Step 1/5 : FROM node:20-alpine"
          echo "   Step 5/5 : CMD nginx"
          echo "   ✅ Successfully built frontend image"
          echo ""
          echo "✅ Docker images criadas!"
          echo "   → vaga-rws:1.0"
          echo "   → vaga-rws-frontend:latest"
      
      - name: Simular Tag Docker Images
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "🏷️  SIMULAÇÃO: Taggeando Docker images..."
          echo "   → vaga-rws:staging-${SHORT_SHA}"
          echo "   → vaga-rws:staging-latest"
          echo "✅ Images taggeadas com sucesso!"
      
      - name: Simular Upload de Artefatos
        run: |
          echo "📦 SIMULAÇÃO: Upload de artefatos..."
          echo "   ✅ backend-staging-${{ github.sha }}.jar (45.2 MB)"
          echo "   ✅ frontend-staging-${{ github.sha }}.zip (2.5 MB)"
          echo "   Retention: 7 dias"
          echo " ✅ Artefatos disponíveis para download!"
      
      - name: Gerar Resumo do Build
        run: |
          echo "## ✅ Build Concluído com Sucesso" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Pipeline Executado" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Testes Backend (25 testes)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Testes Frontend (18 testes)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Análise SonarQube (Quality Gate: PASSOU)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build Backend (JAR: 45.2 MB)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build Frontend (Dist: 2.5 MB)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker Images (staging-latest)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artefatos Gerados" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`backend-staging-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`frontend-staging-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # Job 5: Deploy em Homologação (REQUER APROVAÇÃO DA EQUIPE DE OPERAÇÕES)
  # 
  # ⚠️ IMPORTANTE: Configure aprovadores em Settings → Environments → staging
  # 
  # Este job simula o fluxo atual onde Operações aprova deploy em homologação:
  # 1. Build e testes executam automaticamente
  # 2. Pipeline AGUARDA aprovação da Equipe de Operações
  # 3. Operações revisa e clica "Approve and deploy" no GitHub
  # 4. Deploy acontece automaticamente
  # 
  # Isso ELIMINA o ticket do Taiga - aprovação fica no GitHub!
  deploy:
    name: 🚀 Deploy Homologação (Aguarda Aprovação)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event.inputs.action == 'build+deploy' || github.event_name == 'push'
    environment:
      name: staging
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    
    steps:
      - name: ⏸️ Checkpoint - Aprovação Requerida
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "   ⏸️  AGUARDANDO APROVAÇÃO DA EQUIPE DE OPERAÇÕES"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✅ Pipeline executada com sucesso:"
          echo "   → Testes Backend: PASSOU"
          echo "   → Testes Frontend: PASSOU"
          echo "   → SonarQube: PASSOU"
          echo "   → Build: CONCLUÍDO"
          echo ""
          echo "📦 Pacote pronto para deploy em HOMOLOGAÇÃO"
          echo ""
          echo "👥 Equipe de Operações deve:"
          echo "   1. Revisar os resultados acima"
          echo "   2. Verificar relatórios de qualidade"
          echo "   3. Clicar em 'Review deployments' nesta página"
          echo "   4. Aprovar ou rejeitar o deploy"
          echo ""
          echo "🔗 Após aprovação, deploy será executado automaticamente"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "💡 Isso substitui o ticket do Taiga!"
          echo ""
    
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Deploy em Homologação
        run: |
          echo "🚀 Iniciando deploy em HOMOLOGAÇÃO..."
          echo ""
          echo "📦 Versão: ${{ github.sha }}"
          echo "🔗 Branch: ${{ github.ref_name }}"
          echo "👤 Autor: ${{ github.actor }}"
          echo "📅 Data: $(date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          echo "⚡ Etapas de deploy:"
          sleep 1
          echo "  ✅ Download dos artefatos"
          sleep 1
          echo "  ✅ Parar containers antigos"
          sleep 1
          echo "  ✅ Deploy de novas imagens Docker"
          sleep 1
          echo "  ✅ Iniciar containers"
          sleep 1
          echo "  ✅ Health check: OK"
          echo ""
          echo "🎉 Deploy em homologação concluído com sucesso!"
          echo "🌐 Backend disponível em: http://homologacao.vagarws.com:8080"
          echo "🌐 Frontend disponível em: http://homologacao.vagarws.com:8081"
          echo ""
          echo "📊 Próximos passos:"
          echo "  1. QA pode testar as mudanças"
          echo "  2. Revisar relatórios de qualidade (SonarQube)"
          echo "  3. Após aprovação, fazer merge para main"
          echo "  4. Criar tag para deploy em produção"
      
      - name: Gerar Resumo do Deploy
        run: |
          echo "## 🚀 Deploy em Homologação Concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Pipeline Completo Executado" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Testes Backend + Frontend" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Análise SonarQube" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build Completo" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Deploy em Staging**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Ambientes Disponíveis" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: http://homologacao.vagarws.com:8080" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: http://homologacao.vagarws.com:8081" >> $GITHUB_STEP_SUMMARY
  
  # Job 6: Preview de Release Notes (o que foi deployado)
  release-notes-preview:
    name: 📋 Preview - Release Notes
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event.inputs.action == 'build+deploy' || github.event_name == 'push'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Busca todo o histórico para comparação
      
      - name: Gerar Preview de Release Notes
        run: |
          echo "📋 Gerando preview do que foi deployado em HOMOLOGAÇÃO..."
          echo ""
          echo "## 🚀 Mudanças Nesta Entrega" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Buscar commits desde o último deploy
          echo "### 📦 Commits Incluídos" >> $GITHUB_STEP_SUMMARY
          git log --oneline -10 --pretty=format:"- %s (%an)" >> $GITHUB_STEP_SUMMARY || echo "- Commits recentes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 👤 Informações do Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Autor do Deploy**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Data**: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📝 Próximos Passos" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ **QA**: Testar funcionalidades em homologação" >> $GITHUB_STEP_SUMMARY
          echo "2. ✅ **Validação**: Revisar relatórios SonarQube" >> $GITHUB_STEP_SUMMARY
          echo "3. ✅ **Aprovação**: Solicitar aprovação do cliente" >> $GITHUB_STEP_SUMMARY
          echo "4. 🚀 **Produção**: Após aprovado, fazer merge para \`main\` e criar tag" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 **Dica**: Quando pronto para produção, crie uma tag \`v1.x.x\` para gerar o release notes completo!" >> $GITHUB_STEP_SUMMARY
          
          echo "✅ Preview de release notes gerado!"
