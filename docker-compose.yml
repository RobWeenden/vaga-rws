version: '3.8'
services:
  API:
    build:
       context: ./vagas-rws-backend
       dockerfile: Dockerfile
    image: 'vaga-rws:1.0'
    container_name: 'vaga-rws'
    restart: 'always'
    ports:
      - "8080:8080"
    depends_on:
      - PostgreSQL
      - angular-app
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/vaga
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - CLIENT_CORS_URL=http://localhost:8081 
  PostgreSQL:
    image: postgres
    container_name: 'postgres'
    restart: 'always'
    expose:
    - "5432"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=admin
      - POSTGRES_USER=postgres
      - POSTGRES_DB=vaga
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  angular-app:
    build:
      context: ./vaga-rws-frontend
      dockerfile: Dockerfile
    ports:
      - "8081:80"
      
volumes:
   pgdata:
   