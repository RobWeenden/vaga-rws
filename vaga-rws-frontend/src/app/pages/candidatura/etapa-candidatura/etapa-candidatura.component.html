<div class="bg-white rounded-lg p-6 w-full max-w-md mx-auto">
  <h2 class="text-xl font-semibold text-gray-800 mb-5 border-b pb-2">Atualizar Etapa do Processo</h2>

  <form [formGroup]="etapaForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <mat-checkbox formControlName="etapaAtualConcluida" color="primary">
        <span class="ml-1">Marcar etapa atual como concluída</span>
      </mat-checkbox>
    </div>

    <div>
      <p class="text-sm font-medium text-gray-700 mb-1">Selecione a próxima etapa:</p>
      <mat-form-field appearance="outline" class="w-full">
        <mat-select formControlName="proximaEtapa" placeholder="Selecione a próxima etapa">
          <mat-option *ngFor="let etapa of etapasDisponiveis" [value]="etapa.nome">
            {{ etapa.nome }}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="etapaForm.get('proximaEtapa')?.hasError('required')">
          Selecione a próxima etapa do processo
        </mat-error>
      </mat-form-field>
    </div>

    <div class="flex justify-end space-x-3 pt-4 border-t">
      <button type="button" mat-stroked-button (click)="onCancel()"
        class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-50">
        Cancelar
      </button>
      <button type="submit" mat-raised-button color="primary" [disabled]="!etapaForm.valid"
        class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
        Atualizar Etapa
      </button>
    </div>
  </form>
</div>
