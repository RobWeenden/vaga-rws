#PROFILE DE DESENVOLVIMENTO

server.port=8080

#DATABASE
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:vaga}?user=${POSTGRES_USER:postgres}&password=${POSTGRES_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#NAME-PATH
spring.application.name=vaga-rws
server.servlet.context-path=/api-vaga

client.cors.url=${CLIENT_CORS_URL:http://localhost:4200}

# TOKENS E REFRESH TOKEN
vagarws.authenticator.token.cookie-name=access_token
vagarws.authenticator.token.cookie-refresh-token=refresh_token
vagarws.authenticator.token.secret=ZmluYW5jZTo6YWNhZGVtaWE=
vagarws.authenticator.token.expiration=2
vagarws.authenticator.token.refresh.expiration=7

#RESOURCE PROJECT- BANNER
vagarws.description=@project.name@
vagarws.version=@project.version@

# RESPONSAVEL EM SERIALIZAR O OBJECT_MAPPER NO REGISTRO DE MODULO
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC

# LOG AO START DA APLICACAO PARA VERIFICACAO DA CONFIG DO DATABASE
logging.level.org.springframework.jdbc.datasource.DriverManagerDataSource=DEBUG

# ENVIROMENT PARA AMBIENTE OS TIPOS AMBIENTE
vagarws.env=localhost